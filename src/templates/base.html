<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Swarm Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='monitor.css') }}" rel="stylesheet">
    {% block head_extras %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-nav mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-semibold" href="/">
                <i class="fas fa-fan me-2"></i>Swarm Temperature Control
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Overview</a>
                <a class="nav-link {% if request.path == '/charts' %}active{% endif %}" href="/charts">Trends</a>
                <a class="nav-link {% if request.path == '/node-map' %}active{% endif %}" href="/node-map">Node Map</a>
            </div>
        </div>
    </nav>
    <main class="container-fluid px-4 pb-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
