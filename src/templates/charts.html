{% extends "base.html" %}
{% block title %}Swarm Trends{% endblock %}

{% block head_extras %}
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
{% endblock %}

{% block content %}
<div class="panel-card mb-3">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="panel-title mb-0"><i class="fas fa-chart-line me-2"></i>Swarm Trends</div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <label for="target-input" class="small text-muted mb-0">Target (C)</label>
            <input id="target-input" type="number" step="0.1" min="0" max="40" class="form-control form-control-sm" style="width: 100px;">
            <button id="target-apply" class="btn btn-sm btn-primary">Apply</button>
            <button id="window-open" class="btn btn-sm btn-outline-info">Open Window (20s)</button>
            <span id="target-status" class="small text-muted"></span>
            <span class="small text-muted" id="charts-meta">Loading recent telemetry...</span>
        </div>
    </div>
</div>

<div class="row g-3">
    <div class="col-lg-8">
        <div class="panel-card">
            <div class="mb-2 fw-semibold">Temperature Over Time</div>
            <div id="temp-chart" class="monitor-chart"></div>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="panel-card">
            <div class="mb-2 fw-semibold">Action Counts (Recent Window)</div>
            <div id="action-chart" class="monitor-chart"></div>
        </div>
    </div>
</div>
<div class="row g-3 mt-1">
    <div class="col-12">
        <div class="panel-card">
            <div class="mb-2 fw-semibold">Temperature Over Time (Auto-Scaled Close View)</div>
            <div id="temp-chart-close" class="monitor-chart"></div>
        </div>
    </div>
</div>

<script>
let currentTarget = null;
const CLOSE_VIEW_WINDOW_SECONDS = 180;

function computeCloseViewYRange(traces, startMs, endMs) {
    let minY = Infinity;
    let maxY = -Infinity;
    for (const trace of traces) {
        const xs = Array.isArray(trace.x) ? trace.x : [];
        const ys = Array.isArray(trace.y) ? trace.y : [];
        for (let i = 0; i < Math.min(xs.length, ys.length); i += 1) {
            const xMs = xs[i] instanceof Date ? xs[i].getTime() : Number(xs[i]);
            const yVal = Number(ys[i]);
            if (!Number.isFinite(xMs) || !Number.isFinite(yVal)) continue;
            if (xMs < startMs || xMs > endMs) continue;
            minY = Math.min(minY, yVal);
            maxY = Math.max(maxY, yVal);
        }
    }
    if (!Number.isFinite(minY) || !Number.isFinite(maxY)) {
        return null;
    }
    const span = Math.max(0.2, maxY - minY);
    const pad = Math.max(0.1, span * 0.15);
    return [minY - pad, maxY + pad];
}

async function loadCurrentTarget() {
    const input = document.getElementById("target-input");
    try {
        const resp = await fetch("/api/state", { cache: "no-store" });
        if (!resp.ok) return;
        const payload = await resp.json();
        const t = Number(payload.target_temp);
        if (!Number.isFinite(t)) return;
        currentTarget = t;
        // Avoid clobbering the field while user is typing.
        if (document.activeElement !== input) {
            input.value = String(t);
        }
    } catch (err) {
        console.error(err);
    }
}

async function applyTarget() {
    const input = document.getElementById("target-input");
    const status = document.getElementById("target-status");
    const val = Number(input.value);
    if (!Number.isFinite(val)) {
        status.textContent = "Invalid value";
        return;
    }
    status.textContent = "Updating...";
    try {
        const resp = await fetch("/api/set_target", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ target_temp: val }),
        });
        if (!resp.ok) throw new Error("Target update failed");
        const payload = await resp.json();
        currentTarget = Number(payload.target_temp);
        status.textContent = payload.published ? "Target broadcast sent" : "Updated locally (broadcast failed)";
        await loadCharts();
    } catch (err) {
        status.textContent = "Update failed";
        console.error(err);
    }
}

async function openWindowSim() {
    const status = document.getElementById("target-status");
    status.textContent = "Opening window...";
    try {
        const resp = await fetch("/api/sim/open_window", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ duration_sec: 20, strength: 0.12 }),
        });
        if (!resp.ok) throw new Error("Window simulation failed");
        const payload = await resp.json();
        status.textContent = payload.published ? "Window opened simulation sent" : "Window event failed to broadcast";
    } catch (err) {
        status.textContent = "Window simulation failed";
        console.error(err);
    }
}

async function loadCharts() {
    const meta = document.getElementById("charts-meta");
    try {
        await loadCurrentTarget();
        const resp = await fetch("/api/timeseries", { cache: "no-store" });
        if (!resp.ok) throw new Error("Failed to load chart data");
        const payload = await resp.json();
        const points = Array.isArray(payload.points) ? payload.points : [];

        if (!points.length) {
            meta.textContent = "No telemetry yet. Start nodes and wait a few seconds.";
            Plotly.react("temp-chart", [], { margin: { t: 20, r: 10, b: 40, l: 50 }, uirevision: "temp-chart" }, { responsive: true });
            Plotly.react("action-chart", [], { margin: { t: 20, r: 10, b: 40, l: 50 }, uirevision: "action-chart" }, { responsive: true });
            Plotly.react("temp-chart-close", [], { margin: { t: 20, r: 10, b: 40, l: 50 }, uirevision: "temp-chart-close" }, { responsive: true });
            return;
        }

        const byNode = {};
        let targetSeries = [];
        for (const p of points) {
            const node = p.node_id || "unknown";
            if (!byNode[node]) byNode[node] = { x: [], y: [] };
            byNode[node].x.push(new Date((p.timestamp || 0) * 1000));
            byNode[node].y.push(p.temp);
            if (p.target_temp !== undefined && p.target_temp !== null) {
                targetSeries.push({ x: new Date((p.timestamp || 0) * 1000), y: p.target_temp });
            }
        }

        const tempTraces = Object.keys(byNode).sort().map((node) => ({
            x: byNode[node].x,
            y: byNode[node].y,
            mode: "lines",
            name: node,
        }));

        // Room average line helps evaluate convergence quality.
        const avgByTime = {};
        for (const p of points) {
            const t = new Date((p.timestamp || 0) * 1000).toISOString();
            if (!avgByTime[t]) avgByTime[t] = [];
            if (typeof p.temp === "number") avgByTime[t].push(p.temp);
        }
        const avgTimes = Object.keys(avgByTime).sort();
        const avgVals = avgTimes.map((k) => {
            const vals = avgByTime[k];
            return vals.reduce((a, b) => a + b, 0) / vals.length;
        });
        if (avgTimes.length) {
            tempTraces.push({
                x: avgTimes.map((t) => new Date(t)),
                y: avgVals,
                mode: "lines",
                name: "room_avg",
                line: { width: 4, color: "#111827" },
            });
        }

        if (targetSeries.length) {
            tempTraces.push({
                x: targetSeries.map((p) => p.x),
                y: targetSeries.map((p) => p.y),
                mode: "lines",
                name: "target",
                line: { dash: "dash" },
            });
        } else if (points.length && Number.isFinite(currentTarget)) {
            // Show current target immediately even if no fresh target datapoints yet.
            tempTraces.push({
                x: [new Date((points[0].timestamp || 0) * 1000), new Date((points[points.length - 1].timestamp || 0) * 1000)],
                y: [currentTarget, currentTarget],
                mode: "lines",
                name: "target",
                line: { dash: "dash" },
            });
        }

        Plotly.react(
            "temp-chart",
            tempTraces,
            {
                margin: { t: 20, r: 10, b: 40, l: 50 },
                xaxis: { title: "Time" },
                yaxis: { title: "Temperature (C)", range: [0, 40] },
                legend: { orientation: "h" },
                uirevision: "temp-chart",
            },
            { responsive: true }
        );
        Plotly.react(
            "temp-chart-close",
            tempTraces,
            {
                margin: { t: 20, r: 10, b: 40, l: 50 },
                xaxis: { title: "Time" },
                yaxis: { title: "Temperature (C)", autorange: true },
                legend: { orientation: "h" },
                uirevision: "temp-chart-close",
            },
            { responsive: true }
        );
        if (points.length) {
            const lastTs = Number(points[points.length - 1].timestamp || 0) * 1000;
            const firstTs = Number(points[0].timestamp || 0) * 1000;
            const desiredStart = Math.max(0, lastTs - CLOSE_VIEW_WINDOW_SECONDS * 1000);
            const startTs = Math.max(firstTs, desiredStart);
            const yRange = computeCloseViewYRange(tempTraces, startTs, lastTs);
            Plotly.relayout("temp-chart-close", {
                "xaxis.range": [new Date(startTs), new Date(lastTs)],
                ...(yRange ? { "yaxis.range": yRange } : { "yaxis.autorange": true }),
            });
        }

        const actionCounts = { HEAT_UP: 0, COOL_DOWN: 0, IDLE: 0 };
        for (const p of points) {
            const action = p.action || "IDLE";
            if (actionCounts[action] === undefined) actionCounts[action] = 0;
            actionCounts[action] += 1;
        }
        Plotly.react(
            "action-chart",
            [{
                type: "bar",
                x: Object.keys(actionCounts),
                y: Object.values(actionCounts),
                marker: { color: ["#ef4444", "#3b82f6", "#10b981"] },
            }],
            { margin: { t: 20, r: 10, b: 40, l: 50 }, uirevision: "action-chart" },
            { responsive: true }
        );

        const targetText = Number.isFinite(currentTarget) ? ` | target ${currentTarget.toFixed(1)}C` : "";
        meta.textContent = `${payload.count} points | ${Object.keys(byNode).length} nodes${targetText}`;
    } catch (err) {
        meta.textContent = "Chart data unavailable";
        console.error(err);
    }
}

document.getElementById("target-apply").addEventListener("click", applyTarget);
document.getElementById("window-open").addEventListener("click", openWindowSim);
document.getElementById("target-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") applyTarget();
});

loadCharts();
setInterval(loadCharts, 2000);
</script>
{% endblock %}
