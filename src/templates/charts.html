{% extends "base.html" %}
{% block title %}Swarm Trends{% endblock %}

{% block head_extras %}
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<meta http-equiv="refresh" content="2">
{% endblock %}

{% block content %}
<div class="panel-card mb-3">
    <div class="d-flex justify-content-between align-items-center">
        <div class="panel-title mb-0"><i class="fas fa-chart-line me-2"></i>Trend Charts</div>
        <a href="/" class="btn btn-outline-secondary btn-sm">Back to Overview</a>
    </div>
</div>

<div class="panel-card mb-3"><div id="temp-plot"></div></div>
<div class="panel-card mb-3"><div id="action-plot"></div></div>
<div class="panel-card mb-3"><div id="avg-plot"></div></div>
<div class="panel-card"><div id="pher-plot"></div></div>

<script>
    const plots = {{ plots | safe }};
    if (plots.length > 0) Plotly.newPlot("temp-plot", JSON.parse(plots[0]).data, JSON.parse(plots[0]).layout);
    if (plots.length > 1) Plotly.newPlot("action-plot", JSON.parse(plots[1]).data, JSON.parse(plots[1]).layout);
    if (plots.length > 2) Plotly.newPlot("avg-plot", JSON.parse(plots[2]).data, JSON.parse(plots[2]).layout);
    if (plots.length > 3) Plotly.newPlot("pher-plot", JSON.parse(plots[3]).data, JSON.parse(plots[3]).layout);
</script>
{% endblock %}
